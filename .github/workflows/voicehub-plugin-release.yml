name: VoiceHub Plugin Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.2.3"
        required: true
        type: string
      target_ref:
        description: "Git ref to release from"
        required: false
        default: "main"
        type: string

env:
  DOTNET_VERSION: "10.0.x"
  MARKET_REPOSITORY: "wwiinnddyy/LanAirApp"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: voicehub-plugin-release-${{ github.ref_name || github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      asset_name: ${{ steps.metadata.outputs.asset_name }}
      target_commitish: ${{ steps.metadata.outputs.target_commitish }}

    steps:
      - name: Checkout LanMountainDesktop
        uses: actions/checkout@v4
        with:
          repository: wwiinnddyy/LanMountainDesktop
          fetch-depth: 0
          path: LanMountainDesktop

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: VoiceHubLanDesktop
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize local package feed
        shell: pwsh
        run: |
          $feedPath = Join-Path (Resolve-Path ".\VoiceHubLanDesktop").Path "packages"
          $sdkProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.PluginSdk").Path "LanMountainDesktop.PluginSdk.csproj"
          $contractsProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.Shared.Contracts").Path "LanMountainDesktop.Shared.Contracts.csproj"
          .\VoiceHubLanDesktop\scripts\Initialize-LocalPackageFeed.ps1 `
            -FeedPath $feedPath `
            -PluginSdkProjectPath $sdkProject `
            -CoreContractsProjectPath $contractsProject

      - name: Resolve requested release version
        id: release_plan
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}".Trim()
            if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
              $version = $version.Substring(1)
            }
            $releaseTag = "v$version"
          }
          else {
            $releaseTag = "${{ github.ref_name }}"
            $version = $releaseTag.Substring(1)
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - name: Apply release version
        shell: pwsh
        run: .\VoiceHubLanDesktop\scripts\Set-PluginVersion.ps1 -Version "${{ steps.release_plan.outputs.version }}" -RepositoryRoot (Resolve-Path ".\VoiceHubLanDesktop").Path

      - name: Validate plugin metadata
        shell: pwsh
        run: .\VoiceHubLanDesktop\scripts\Test-PluginConsistency.ps1 -RepositoryRoot (Resolve-Path ".\VoiceHubLanDesktop").Path

      - name: Prepare release source commit
        id: release_source
        shell: pwsh
        run: |
          $repoPath = (Resolve-Path ".\VoiceHubLanDesktop").Path
          $releaseTag = "${{ steps.release_plan.outputs.release_tag }}"
          $eventName = "${{ github.event_name }}"
          $versionFiles = @(
            "VoiceHubLanDesktop.csproj",
            "plugin.json",
            "README.md"
          )

          git -C $repoPath config user.name "github-actions[bot]"
          git -C $repoPath config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $statusLines = git -C $repoPath status --porcelain -- $versionFiles
          $hasVersionFileChanges = $statusLines.Count -gt 0

          if ($eventName -eq "workflow_dispatch") {
            if ($hasVersionFileChanges) {
              $sourceBranch = "automation/release-source-$releaseTag"
              git -C $repoPath checkout -B $sourceBranch
              git -C $repoPath add -- $versionFiles
              git -C $repoPath commit -m "chore: prepare release $releaseTag"
              git -C $repoPath push origin HEAD:refs/heads/$sourceBranch --force
              $targetCommitish = (git -C $repoPath rev-parse HEAD).Trim()
              $temporaryBranch = $sourceBranch
            }
            else {
              $targetCommitish = (git -C $repoPath rev-parse HEAD).Trim()
              $temporaryBranch = ""
            }
          }
          else {
            if ($hasVersionFileChanges) {
              throw "Tag '$releaseTag' does not point to source files with matching plugin version metadata. Create the matching version commit first, or use workflow_dispatch to prepare the release version automatically."
            }

            $targetCommitish = (git -C $repoPath rev-parse HEAD).Trim()
            $temporaryBranch = ""
          }

          "target_commitish=$targetCommitish" >> $env:GITHUB_OUTPUT
          "temporary_branch=$temporaryBranch" >> $env:GITHUB_OUTPUT

      - name: Resolve build metadata
        id: metadata
        shell: pwsh
        run: |
          $manifest = Get-Content .\VoiceHubLanDesktop\plugin.json -Encoding UTF8 -Raw | ConvertFrom-Json
          $version = $manifest.version.Trim()
          $requestedVersion = "${{ steps.release_plan.outputs.version }}".Trim()
          if ($version -ne $requestedVersion) {
            throw "Plugin manifest version '$version' does not match requested release version '$requestedVersion'."
          }
          $assetName = "$($manifest.id).$version.laapp"
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=v$version" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "target_commitish=${{ steps.release_source.outputs.target_commitish }}" >> $env:GITHUB_OUTPUT

      - name: Build plugin package
        shell: pwsh
        run: dotnet build .\VoiceHubLanDesktop\VoiceHubLanDesktop.csproj -c Release -v minimal

      - name: Validate built package
        shell: pwsh
        run: .\VoiceHubLanDesktop\scripts\Test-PluginConsistency.ps1 -RepositoryRoot (Resolve-Path ".\VoiceHubLanDesktop").Path -PackagePath ".\VoiceHubLanDesktop\${{ steps.metadata.outputs.asset_name }}"

      - name: Generate release metadata
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\VoiceHubLanDesktop\artifacts | Out-Null
          $packagePath = Resolve-Path ".\VoiceHubLanDesktop\${{ steps.metadata.outputs.asset_name }}"
          $sha256 = (Get-FileHash -Path $packagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $md5 = (Get-FileHash -Path $packagePath -Algorithm MD5).Hash.ToLowerInvariant()
          Set-Content -Path .\VoiceHubLanDesktop\artifacts\sha256.txt -Value $sha256 -Encoding utf8NoBOM
          Set-Content -Path .\VoiceHubLanDesktop\artifacts\md5.txt -Value $md5 -Encoding utf8NoBOM
          .\VoiceHubLanDesktop\scripts\New-ReleaseNotes.ps1 `
            -PackageName "${{ steps.metadata.outputs.asset_name }}" `
            -Version "${{ steps.metadata.outputs.version }}" `
            -ReleaseTag "${{ steps.metadata.outputs.release_tag }}" `
            -Md5 $md5 `
            -Sha256 $sha256 `
            -OutputPath .\VoiceHubLanDesktop\artifacts\release-notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          target_commitish: ${{ steps.metadata.outputs.target_commitish }}
          name: ${{ steps.metadata.outputs.release_tag }}
          body_path: VoiceHubLanDesktop/artifacts/release-notes.md
          files: |
            VoiceHubLanDesktop/${{ steps.metadata.outputs.asset_name }}
            VoiceHubLanDesktop/artifacts/sha256.txt
            VoiceHubLanDesktop/artifacts/md5.txt
          fail_on_unmatched_files: true
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and verify published release asset
        shell: pwsh
        run: |
          $assetName = "${{ steps.metadata.outputs.asset_name }}"
          $releaseTag = "${{ steps.metadata.outputs.release_tag }}"
          $repository = "${{ github.repository }}"
          $expectedPackagePath = (Resolve-Path ".\VoiceHubLanDesktop\$assetName").Path
          $verifiedDirectory = (Join-Path (Resolve-Path ".\VoiceHubLanDesktop\artifacts").Path "verified")
          $verifiedPackagePath = Join-Path $verifiedDirectory $assetName
          $expectedHash = (Get-FileHash -Path $expectedPackagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $expectedMd5 = (Get-FileHash -Path $expectedPackagePath -Algorithm MD5).Hash.ToLowerInvariant()
          $expectedSize = (Get-Item $expectedPackagePath).Length
          $downloadUrl = "https://github.com/$repository/releases/download/$releaseTag/$assetName"

          New-Item -ItemType Directory -Force -Path $verifiedDirectory | Out-Null

          $maxAttempts = 8
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Invoke-WebRequest `
                -Uri $downloadUrl `
                -Headers @{ "User-Agent" = "VoiceHubLanDesktop.ReleaseWorkflow/1.0" } `
                -OutFile $verifiedPackagePath
              break
            }
            catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }

              Start-Sleep -Seconds ([Math]::Min(5 * $attempt, 30))
            }
          }

          $actualHash = (Get-FileHash -Path $verifiedPackagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $actualMd5 = (Get-FileHash -Path $verifiedPackagePath -Algorithm MD5).Hash.ToLowerInvariant()
          $actualSize = (Get-Item $verifiedPackagePath).Length

          if ($expectedHash -ne $actualHash -or $expectedMd5 -ne $actualMd5 -or $expectedSize -ne $actualSize) {
            throw "Published release asset mismatch. Url='$downloadUrl'; Expected SHA256='$expectedHash'; Actual SHA256='$actualHash'; Expected MD5='$expectedMd5'; Actual MD5='$actualMd5'; Expected Size='$expectedSize'; Actual Size='$actualSize'."
          }

          Set-Content -Path .\VoiceHubLanDesktop\artifacts\sha256.txt -Value $actualHash -Encoding utf8NoBOM
          Set-Content -Path .\VoiceHubLanDesktop\artifacts\md5.txt -Value $actualMd5 -Encoding utf8NoBOM

      - name: Generate verified AirApp Market sync metadata
        shell: pwsh
        run: |
          $verifiedPackagePath = Resolve-Path ".\VoiceHubLanDesktop\artifacts\verified\${{ steps.metadata.outputs.asset_name }}"
          .\VoiceHubLanDesktop\scripts\New-AirAppMarketSync.ps1 `
            -TemplatePath .\VoiceHubLanDesktop\airappmarket-entry.template.json `
            -PackagePath $verifiedPackagePath `
            -Version "${{ steps.metadata.outputs.version }}" `
            -OutputPath .\VoiceHubLanDesktop\artifacts\airappmarket-sync.json

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicehub-plugin-release
          path: |
            VoiceHubLanDesktop/artifacts/verified/${{ steps.metadata.outputs.asset_name }}
            VoiceHubLanDesktop/artifacts/sha256.txt
            VoiceHubLanDesktop/artifacts/md5.txt
            VoiceHubLanDesktop/artifacts/release-notes.md
            VoiceHubLanDesktop/artifacts/airappmarket-sync.json
          if-no-files-found: error
          retention-days: 30

      - name: Delete temporary release source branch
        if: always() && steps.release_source.outputs.temporary_branch != ''
        shell: pwsh
        run: git -C .\VoiceHubLanDesktop push origin --delete "${{ steps.release_source.outputs.temporary_branch }}"

  sync-root-fallback-pr:
    needs: release
    runs-on: windows-latest
    continue-on-error: true
    env:
      ROOT_SYNC_TOKEN: ${{ secrets.VOICEHUB_PLUGIN_PR_TOKEN != '' && secrets.VOICEHUB_PLUGIN_PR_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: VoiceHubLanDesktop
          ref: main

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: voicehub-plugin-release
          path: downloaded

      - name: Sync repository root fallback package
        shell: pwsh
        run: |
          .\VoiceHubLanDesktop\scripts\Set-PluginVersion.ps1 -Version "${{ needs.release.outputs.version }}" -RepositoryRoot (Resolve-Path ".\VoiceHubLanDesktop").Path
          Get-ChildItem .\VoiceHubLanDesktop -Filter "*.laapp" -File | Remove-Item -Force
          $package = Get-ChildItem .\downloaded -Recurse -Filter "*.laapp" | Select-Object -First 1
          if (-not $package) {
            throw "Release package artifact not found."
          }
          Copy-Item $package.FullName (Join-Path (Resolve-Path ".\VoiceHubLanDesktop").Path $package.Name) -Force

      - name: Create root fallback PR
        id: root_fallback_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.ROOT_SYNC_TOKEN }}
          path: VoiceHubLanDesktop
          branch: automation/root-fallback-${{ needs.release.outputs.release_tag }}
          delete-branch: true
          commit-message: "chore: sync root fallback package ${{ needs.release.outputs.release_tag }}"
          title: "chore: sync root fallback package ${{ needs.release.outputs.release_tag }}"
          body: |
            Sync the repository-root fallback package and version files after releasing `${{ needs.release.outputs.release_tag }}`.
          add-paths: |
            *.laapp
            VoiceHubLanDesktop.csproj
            plugin.json
            README.md

      - name: Merge root fallback PR
        if: steps.root_fallback_pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.ROOT_SYNC_TOKEN }}
          script: |
            const pullNumber = Number("${{ steps.root_fallback_pr.outputs.pull-request-number }}");
            const { owner, repo } = context.repo;

            const pull = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber
            });

            if (pull.data.state !== "open") {
              throw new Error(`Root fallback PR #${pullNumber} is not open.`);
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pullNumber,
              merge_method: "squash"
            });

      - name: Verify root fallback sync result
        if: steps.root_fallback_pr.outputs.pull-request-number == ''
        shell: pwsh
        run: |
          if ("${{ steps.root_fallback_pr.outputs.pull-request-operation }}" -ne "none") {
            throw "Root fallback sync did not produce a PR and was not reported as already up to date."
          }
          Write-Host "Root fallback files already match the released version."

  close-stale-sync-prs:
    needs:
      - release
      - sync-root-fallback-pr
    runs-on: windows-latest
    continue-on-error: true
    if: ${{ always() && needs.release.result == 'success' }}
    env:
      ROOT_SYNC_TOKEN: ${{ secrets.VOICEHUB_PLUGIN_PR_TOKEN != '' && secrets.VOICEHUB_PLUGIN_PR_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Close stale root fallback PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.ROOT_SYNC_TOKEN }}
          script: |
            const currentRef = `automation/root-fallback-${{ needs.release.outputs.release_tag }}`;
            const { owner, repo } = context.repo;
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            for (const pull of pulls) {
              if (!pull.head.ref.startsWith("automation/root-fallback-v") || pull.head.ref === currentRef) {
                continue;
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pull.number,
                state: "closed"
              });

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${pull.head.ref}`
                });
              }
              catch (error) {
                core.warning(`Failed to delete stale root fallback branch '${pull.head.ref}': ${error.message}`);
              }
            }
