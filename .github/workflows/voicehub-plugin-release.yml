name: VoiceHub Plugin Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.2.3"
        required: true
        type: string

env:
  DOTNET_VERSION: "10.0.x"

permissions:
  contents: write

concurrency:
  group: voicehub-plugin-release-${{ github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      asset_name: ${{ steps.metadata.outputs.asset_name }}
      target_commitish: ${{ steps.release_source.outputs.target_commitish }}

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: VoiceHubLanDesktop
          ref: main

      - name: Checkout LanMountainDesktop
        uses: actions/checkout@v4
        with:
          repository: wwiinnddyy/LanMountainDesktop
          fetch-depth: 0
          path: LanMountainDesktop

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize local package feed
        shell: pwsh
        run: |
          $feedPath = Join-Path (Resolve-Path ".\VoiceHubLanDesktop").Path "packages"
          $sdkProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.PluginSdk").Path "LanMountainDesktop.PluginSdk.csproj"
          $contractsProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.Shared.Contracts").Path "LanMountainDesktop.Shared.Contracts.csproj"
          .\VoiceHubLanDesktop\scripts\Initialize-LocalPackageFeed.ps1 `
            -FeedPath $feedPath `
            -PluginSdkProjectPath $sdkProject `
            -CoreContractsProjectPath $contractsProject

      - name: Resolve requested release version
        id: release_plan
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}".Trim()
          if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          $releaseTag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - name: Update main with release version
        id: release_source
        shell: pwsh
        run: |
          $repoPath = (Resolve-Path ".\VoiceHubLanDesktop").Path
          $version = "${{ steps.release_plan.outputs.version }}"
          $releaseTag = "${{ steps.release_plan.outputs.release_tag }}"
          $versionFiles = @(
            "VoiceHubLanDesktop.csproj",
            "plugin.json",
            "README.md"
          )

          git -C $repoPath config user.name "github-actions[bot]"
          git -C $repoPath config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C $repoPath checkout -B main

          .\VoiceHubLanDesktop\scripts\Set-PluginVersion.ps1 -Version $version -RepositoryRoot $repoPath

          $statusLines = @(git -C $repoPath status --porcelain -- $versionFiles)
          if ($statusLines.Count -gt 0) {
            git -C $repoPath add -- $versionFiles
            git -C $repoPath commit -m "chore: prepare release $releaseTag"
          }

          git -C $repoPath push origin HEAD:refs/heads/main
          $targetCommitish = (git -C $repoPath rev-parse HEAD).Trim()
          "target_commitish=$targetCommitish" >> $env:GITHUB_OUTPUT

      - name: Resolve build metadata
        id: metadata
        shell: pwsh
        run: |
          $manifest = Get-Content .\VoiceHubLanDesktop\plugin.json -Encoding UTF8 -Raw | ConvertFrom-Json
          $version = $manifest.version.Trim()
          $requestedVersion = "${{ steps.release_plan.outputs.version }}".Trim()
          if ($version -ne $requestedVersion) {
            throw "Plugin manifest version '$version' does not match requested release version '$requestedVersion'."
          }

          $assetName = "$($manifest.id).$version.laapp"
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=v$version" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Build plugin package
        shell: pwsh
        run: dotnet build .\VoiceHubLanDesktop\VoiceHubLanDesktop.csproj -c Release -v minimal

      - name: Validate built package
        shell: pwsh
        run: .\VoiceHubLanDesktop\scripts\Test-PluginConsistency.ps1 -RepositoryRoot (Resolve-Path ".\VoiceHubLanDesktop").Path -PackagePath ".\VoiceHubLanDesktop\${{ steps.metadata.outputs.asset_name }}"

      - name: Generate release notes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\VoiceHubLanDesktop\artifacts | Out-Null
          $packagePath = Resolve-Path ".\VoiceHubLanDesktop\${{ steps.metadata.outputs.asset_name }}"
          $sha256 = (Get-FileHash -Path $packagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $md5 = (Get-FileHash -Path $packagePath -Algorithm MD5).Hash.ToLowerInvariant()
          Set-Content -Path .\VoiceHubLanDesktop\artifacts\sha256.txt -Value $sha256 -Encoding utf8NoBOM
          Set-Content -Path .\VoiceHubLanDesktop\artifacts\md5.txt -Value $md5 -Encoding utf8NoBOM
          .\VoiceHubLanDesktop\scripts\New-ReleaseNotes.ps1 `
            -PackageName "${{ steps.metadata.outputs.asset_name }}" `
            -Version "${{ steps.metadata.outputs.version }}" `
            -ReleaseTag "${{ steps.metadata.outputs.release_tag }}" `
            -Md5 $md5 `
            -Sha256 $sha256 `
            -OutputPath .\VoiceHubLanDesktop\artifacts\release-notes.md

      - name: Create or update tag
        shell: pwsh
        run: |
          $repoPath = (Resolve-Path ".\VoiceHubLanDesktop").Path
          $releaseTag = "${{ steps.metadata.outputs.release_tag }}"
          $targetCommitish = "${{ steps.release_source.outputs.target_commitish }}"
          git -C $repoPath tag -f $releaseTag $targetCommitish
          git -C $repoPath push origin refs/tags/$releaseTag --force

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          target_commitish: ${{ steps.release_source.outputs.target_commitish }}
          name: ${{ steps.metadata.outputs.release_tag }}
          body_path: VoiceHubLanDesktop/artifacts/release-notes.md
          files: |
            VoiceHubLanDesktop/${{ steps.metadata.outputs.asset_name }}
            VoiceHubLanDesktop/artifacts/sha256.txt
            VoiceHubLanDesktop/artifacts/md5.txt
          fail_on_unmatched_files: true
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and verify published release asset
        shell: pwsh
        run: |
          $assetName = "${{ steps.metadata.outputs.asset_name }}"
          $releaseTag = "${{ steps.metadata.outputs.release_tag }}"
          $repository = "${{ github.repository }}"
          $expectedPackagePath = (Resolve-Path ".\VoiceHubLanDesktop\$assetName").Path
          $verifiedDirectory = (Join-Path (Resolve-Path ".\VoiceHubLanDesktop\artifacts").Path "verified")
          $verifiedPackagePath = Join-Path $verifiedDirectory $assetName
          $expectedHash = (Get-FileHash -Path $expectedPackagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $expectedMd5 = (Get-FileHash -Path $expectedPackagePath -Algorithm MD5).Hash.ToLowerInvariant()
          $expectedSize = (Get-Item $expectedPackagePath).Length
          $downloadUrl = "https://github.com/$repository/releases/download/$releaseTag/$assetName"

          New-Item -ItemType Directory -Force -Path $verifiedDirectory | Out-Null

          $maxAttempts = 8
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Invoke-WebRequest `
                -Uri $downloadUrl `
                -Headers @{ "User-Agent" = "VoiceHubLanDesktop.ReleaseWorkflow/1.0" } `
                -OutFile $verifiedPackagePath
              break
            }
            catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }

              Start-Sleep -Seconds ([Math]::Min(5 * $attempt, 30))
            }
          }

          $actualHash = (Get-FileHash -Path $verifiedPackagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $actualMd5 = (Get-FileHash -Path $verifiedPackagePath -Algorithm MD5).Hash.ToLowerInvariant()
          $actualSize = (Get-Item $verifiedPackagePath).Length

          if ($expectedHash -ne $actualHash -or $expectedMd5 -ne $actualMd5 -or $expectedSize -ne $actualSize) {
            throw "Published release asset mismatch. Url='$downloadUrl'; Expected SHA256='$expectedHash'; Actual SHA256='$actualHash'; Expected MD5='$expectedMd5'; Actual MD5='$actualMd5'; Expected Size='$expectedSize'; Actual Size='$actualSize'."
          }

          Set-Content -Path .\VoiceHubLanDesktop\artifacts\sha256.txt -Value $actualHash -Encoding utf8NoBOM
          Set-Content -Path .\VoiceHubLanDesktop\artifacts\md5.txt -Value $actualMd5 -Encoding utf8NoBOM

      - name: Generate market manifest from verified package
        shell: pwsh
        run: |
          $verifiedPackagePath = (Join-Path (Resolve-Path ".\VoiceHubLanDesktop\artifacts\verified").Path "${{ steps.metadata.outputs.asset_name }}")
          .\VoiceHubLanDesktop\scripts\New-MarketManifest.ps1 `
            -TemplatePath .\VoiceHubLanDesktop\airappmarket-entry.template.json `
            -PackagePath $verifiedPackagePath `
            -Version "${{ steps.metadata.outputs.version }}" `
            -ReleaseTag "${{ steps.metadata.outputs.release_tag }}" `
            -OutputPath .\VoiceHubLanDesktop\artifacts\market-manifest.json

      - name: Publish verified market manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          target_commitish: ${{ steps.release_source.outputs.target_commitish }}
          files: |
            VoiceHubLanDesktop/artifacts/market-manifest.json
          fail_on_unmatched_files: true
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
